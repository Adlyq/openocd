# Script for Nationstech N32G031 family
# The N32G031 supports SWD transport only.

transport select swd

source [find mem_helper.tcl]

if { [info exists CHIPNAME] } {
   set _CHIPNAME $CHIPNAME
} else {
   set _CHIPNAME n32g031
}

set _ENDIAN little

# Work-area is a space in RAM used for flash programming
# By default use 4kB (N32G031 has 8kB SRAM total)
if { [info exists WORKAREASIZE] } {
   set _WORKAREASIZE $WORKAREASIZE
} else {
   set _WORKAREASIZE 0x1000
}

# Allow overriding the Flash bank size
if { [info exists FLASH_SIZE] } {
	set _FLASH_SIZE $FLASH_SIZE
} else {
	# autodetect size
	set _FLASH_SIZE 0
}

# SWD scan chain
if { [info exists CPUTAPID] } {
   set _CPUTAPID $CPUTAPID
} else {
   # Cortex-M0 SWD ID
   set _CPUTAPID 0x0bb11477
}

swd newdap $_CHIPNAME cpu -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME cortex_m -endian $_ENDIAN -dap $_CHIPNAME.dap

# SRAM starts at 0x20000000
$_TARGETNAME configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 0

# Flash bank using the new n32g031 driver
set _FLASHNAME $_CHIPNAME.flash
flash bank $_FLASHNAME n32g031 0x08000000 $_FLASH_SIZE 0 0 $_TARGETNAME

# Adapter speed should be <= F_CPU/6. F_CPU after reset is 8MHz (HSI), so use 1MHz
# adapter speed 1000

adapter srst delay 100

reset_config srst_nogate

if {![using_hla]} {
   # if srst is not fitted use SYSRESETREQ to perform a soft reset
   cortex_m reset_config sysresetreq
}

proc n32g031_default_reset_start {} {
	# Reset clock is HSI (8 MHz)
	# adapter speed 1000
}

proc n32g031_default_examine_end {} {
	# Enable debug during low-power modes STOP/PD, and freeze watchdogs (IWDG, WWDG) during halt
	# PWR_DBGCTRL = PWR_BASE + 0x18 = 0x40007018
	# Bits: STOP (0x02), PD (0x04), IWDGSTP (0x100), WWDGSTP (0x200) -> 0x306
	mmw 0x40007018 0x00000306 0

	# Check if chip is readout protected (RDP L1 is active)
	# FLASH_OBR = 0x4002201C, Bit 1 (RDPRTL1) is set if RDP L1 is enabled
	set obr [mrw 0x4002201C]
	if { [expr {$obr & 0x02}] } {
		echo "N32G031: Readout protection (RDP L1) detected! Unlocking target (this will trigger a mass erase)..."
		
		# 1. Unlock Flash and Option registers
		mww 0x40022004 0x45670123
		mww 0x40022004 0xCDEF89AB
		mww 0x40022008 0x45670123
		mww 0x40022008 0xCDEF89AB
		
		# 2. Erase Option Bytes (preserves OPTWRE bit 9)
		mww 0x40022010 0x220
		mww 0x40022010 0x260
		sleep 20
		mww 0x40022010 0x200
		
		# 3. Write 'str r1, [r0]' (0x6001) and 'bkpt' (0xbe00) code to SRAM
		mwh 0x20000000 0x6001
		mwh 0x20000002 0xbe00
		
		# 4. Program OB using CPU core (RDP = 0xA5, USER = 0x3F -> 0xC03F5AA5)
		mww 0x40022010 0x210
		reg r0 0x1FFFF600
		reg r1 0xC03F5AA5
		reg pc 0x20000001
		resume
		sleep 20
		halt
		
		# 5. Lock Flash
		mww 0x40022010 0x80
		
		# 6. Reset target to apply settings
		reset halt
		echo "N32G031: Target successfully unlocked and Option Bytes configured!"
	}
}

# Default hooks
$_TARGETNAME configure -event examine-end { n32g031_default_examine_end }
$_TARGETNAME configure -event reset-start { n32g031_default_reset_start }
